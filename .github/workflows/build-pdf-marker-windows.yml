# Builds PDFMarkerTool.exe on Windows and uploads it for download (Artifacts + optional Release).
# PDF Marker is separate from Tofanari Main Tool — see APPLICATIONS.txt in the repo.
# After you push: Actions tab → latest run → Artifacts → PDFMarkerTool-Windows-x64.zip

name: Build PDF Marker (Windows EXE)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pymupdf pillow

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --distpath=dist --workpath=build/pdf_marker pdf_marker/pdf_marker.spec

      - name: Upload EXE (download from Actions)
        uses: actions/upload-artifact@v4
        with:
          name: PDFMarkerTool-Windows-x64
          path: dist/PDFMarkerTool.exe
          if-no-files-found: error

  # When you push a tag like pdf-marker-v1.0.0, also attach the EXE to a GitHub Release.
  publish-release:
    needs: build-windows-exe
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/pdf-marker-')
    permissions:
      contents: write
    steps:
      - name: Download built EXE
        uses: actions/download-artifact@v4
        with:
          name: PDFMarkerTool-Windows-x64
          path: dist

      - name: Create GitHub Release with EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDFMarkerTool.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
